<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rotary Star Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body {
      font-family: "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
      background:
        linear-gradient(180deg, rgba(12,35,64,.06), rgba(244,247,250,0) 280px),
        #f4f7fa;
    }
    .rotary-blue { background: linear-gradient(135deg, #0c2340 0%, #173b66 72%, #8a704c 160%); }
    .rotary-gold { color: #8a704c; }
    .bg-rotary-gold { background: #8a704c; }
    .section {
      background: rgba(255,255,255,.96);
      border: 1px solid rgba(138,112,76,.16);
      border-radius: 8px;
      box-shadow: 0 12px 30px rgba(12,35,64,.08);
    }
    .metric-card {
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      border: 1px solid #e5e7eb;
      box-shadow: inset 0 3px 0 rgba(138,112,76,.45);
    }
    .metric-card.clickable:hover {
      border-color: rgba(138,112,76,.55);
      background: linear-gradient(180deg, #fffaf0 0%, #ffffff 100%);
    }
    .gold-panel {
      background: linear-gradient(135deg, #fff7e6 0%, #f8fafc 100%);
      border: 1px solid rgba(138,112,76,.28);
    }
    .month-active {
      background: #0c2340;
      color: #fff;
      border-color: #0c2340;
      box-shadow: 0 5px 14px rgba(12,35,64,.18);
    }
    .month-idle {
      background: #fff;
      color: #475569;
      border-color: #e5e7eb;
    }
    .month-idle:hover {
      border-color: rgba(138,112,76,.45);
      color: #0c2340;
    }
    .month-rail {
      scrollbar-width: none;
      scroll-snap-type: x proximity;
    }
    .month-rail::-webkit-scrollbar { display: none; }
    .month-btn { scroll-snap-align: center; white-space: nowrap; }
    .rail-btn {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(138,112,76,.24);
      background: #fff;
      color: #8a704c;
      box-shadow: 0 4px 12px rgba(12,35,64,.08);
    }
    .rail-btn:hover { background: #fff7e6; }
    .showcase-rail {
      scrollbar-width: none;
      scroll-snap-type: x proximity;
    }
    .showcase-rail::-webkit-scrollbar { display: none; }
    .showcase-card {
      min-width: 240px;
      scroll-snap-align: start;
    }
    .status-done { background: #dcfce7; color: #166534; }
    .status-open { background: #fef3c7; color: #92400e; }
    .status-planned { background: #f1f5f9; color: #475569; }
  </style>
</head>
<body class="text-slate-800">
  <nav class="rotary-blue text-white px-4 md:px-6 py-4">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row md:items-center md:justify-between gap-3">
      <div class="flex items-center gap-3">
        <div class="w-11 h-11 rounded bg-yellow-400/15 border border-yellow-400/30 flex items-center justify-center">
          <i class="fa-solid fa-star text-yellow-400 text-2xl"></i>
        </div>
        <div>
          <h1 id="siteTitle" class="text-xl md:text-2xl font-black"></h1>
          <p id="siteSubtitle" class="text-xs text-slate-300"></p>
        </div>
      </div>
      <div id="siteBadge" class="text-sm border border-yellow-500/40 bg-yellow-500/10 px-3 py-1 rounded text-yellow-300 font-semibold w-fit"></div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto p-4 md:p-6 space-y-6">
    <section class="section p-5 md:p-6">
      <div class="grid grid-cols-1 lg:grid-cols-[1.15fr_.85fr] gap-6">
        <div>
          <p id="heroEyebrow" class="text-sm font-bold rotary-gold"></p>
          <h2 id="heroTitle" class="text-3xl md:text-5xl font-black mt-2 leading-tight"></h2>
          <div class="mt-6 grid grid-cols-2 lg:grid-cols-5 gap-3" id="dashboardCards"></div>
        </div>
        <div class="gold-panel rounded-lg p-5">
          <div class="flex justify-between items-end mb-2">
            <div>
              <p id="goalLabel" class="text-xs font-bold text-slate-500"></p>
              <p class="text-2xl font-black"><span id="currentStars">0</span> / <span id="goalStars">0</span></p>
            </div>
            <p class="text-3xl font-black rotary-gold" id="progressRate">0%</p>
          </div>
          <div class="w-full h-4 bg-white border border-slate-200 rounded-full overflow-hidden">
            <div id="progressBar" class="h-full bg-gradient-to-r from-amber-500 to-emerald-500 rounded-full" style="width:0%"></div>
          </div>
          <p id="goalNote" class="text-xs text-slate-500 mt-3"></p>
        </div>
      </div>
    </section>

    <section class="section p-5 md:p-6">
      <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4 mb-5">
        <div>
          <h2 class="text-xl font-black flex items-center gap-2"><i class="fa-solid fa-calendar-check rotary-gold"></i><span id="mapTitle"></span></h2>
          <p id="mapSubtitle" class="text-sm text-slate-500 mt-1"></p>
        </div>
        <div class="flex items-center gap-2 w-full md:w-auto">
          <button id="monthPrevBtn" class="rail-btn rounded flex items-center justify-center shrink-0" aria-label="previous month">
            <i class="fa-solid fa-chevron-left text-xs"></i>
          </button>
          <div id="monthTabs" class="month-rail flex gap-2 overflow-x-auto max-w-full md:max-w-[560px] px-1 py-1"></div>
          <button id="monthNextBtn" class="rail-btn rounded flex items-center justify-center shrink-0" aria-label="next month">
            <i class="fa-solid fa-chevron-right text-xs"></i>
          </button>
        </div>
      </div>
      <div class="gold-panel rounded-lg mb-5 overflow-hidden">
        <div id="monthShowcase" class="showcase-rail flex md:grid md:grid-cols-3 gap-3 overflow-x-auto p-3"></div>
      </div>
      <div class="flex items-center gap-2 mb-3">
        <i class="fa-solid fa-map-location-dot rotary-gold"></i>
        <h3 id="mapDetailTitle" class="font-black"></h3>
      </div>
      <div class="grid grid-cols-1 lg:grid-cols-[.8fr_1.2fr] gap-5">
        <div class="gold-panel rounded-lg p-5">
          <p class="text-sm font-bold text-slate-500" id="selectedMonthLabel"></p>
          <p class="text-4xl font-black mt-2"><span id="selectedMonthStars">0</span></p>
          <p id="monthStarsLabel" class="text-sm text-slate-500 mt-2"></p>
          <div class="mt-5 space-y-2 text-sm" id="selectedMonthSummary"></div>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-left min-w-[640px]">
            <thead><tr id="mapHead" class="text-xs text-slate-500 border-b border-slate-200"></tr></thead>
            <tbody id="starMapBody" class="divide-y divide-slate-100 text-sm"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="grid grid-cols-1 gap-6">
      <div class="section p-5 md:p-6">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-4">
          <h2 class="text-xl font-black flex items-center gap-2"><i class="fa-solid fa-ranking-star rotary-gold"></i><span id="rankTitle"></span></h2>
          <div class="flex flex-col sm:flex-row gap-2 w-full md:w-auto">
            <button id="openAllMembersBtn" class="inline-flex items-center justify-center gap-2 rotary-blue text-white px-3 py-2 rounded text-sm font-bold hover:opacity-95 transition">
              <i class="fa-solid fa-users"></i><span id="allMembersButtonText"></span>
            </button>
            <div class="relative">
              <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-slate-400 text-sm"></i>
              <input id="searchInput" type="text" class="pl-9 pr-4 py-2 border border-slate-200 rounded text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 w-full md:w-64">
            </div>
          </div>
        </div>
        <div class="overflow-x-auto rounded border border-slate-100">
          <table class="w-full text-left min-w-[560px]">
            <thead><tr id="rankHead" class="bg-slate-50 text-slate-500 text-xs font-bold border-b border-slate-100"></tr></thead>
            <tbody id="leaderboardBody" class="divide-y divide-slate-50 text-sm"></tbody>
          </table>
        </div>
      </div>
      <div class="section p-5 md:p-6">
        <div class="mb-4">
          <div>
            <h2 class="text-xl font-black flex items-center gap-2"><i class="fa-solid fa-book-open rotary-gold"></i><span id="rulesTitle"></span></h2>
            <p id="rulesSummary" class="text-sm text-slate-500 mt-1"></p>
          </div>
        </div>
        <div id="rulesList" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
      </div>
    </section>

  </main>

  <div id="memberModal" class="fixed inset-0 bg-slate-900/60 hidden z-50 p-4 items-center justify-center">
    <div class="bg-white rounded-lg max-w-lg w-full shadow-2xl overflow-hidden">
      <div class="rotary-blue p-5 text-white flex justify-between items-start">
        <div><p class="text-xs text-yellow-300 font-bold" id="modalRole"></p><h3 id="modalName" class="text-2xl font-black mt-1"></h3></div>
        <button id="closeModalBtn" class="text-white/70 hover:text-white text-xl" aria-label="close"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="p-5">
        <div class="grid grid-cols-3 gap-3 mb-5 text-center">
          <div class="bg-slate-50 rounded p-3"><p id="modalStarsLabel" class="text-xs text-slate-500"></p><p class="text-xl font-black" id="modalStars"></p></div>
          <div class="bg-slate-50 rounded p-3"><p id="modalMonthLabel" class="text-xs text-slate-500"></p><p class="text-xl font-black" id="modalMonthlyStars"></p></div>
          <div class="bg-slate-50 rounded p-3"><p id="modalRankLabel" class="text-xs text-slate-500"></p><p class="text-xl font-black" id="modalRank"></p></div>
        </div>
        <h4 id="modalHistoryTitle" class="font-black mb-3"></h4>
        <div id="modalHistory" class="space-y-3 max-h-72 overflow-y-auto"></div>
      </div>
    </div>
  </div>

  <div id="topThreeModal" class="fixed inset-0 bg-slate-900/60 hidden z-50 p-4 items-center justify-center">
    <div class="bg-white rounded-lg max-w-md w-full shadow-2xl overflow-hidden">
      <div class="rotary-blue p-5 text-white flex justify-between items-start">
        <div>
          <p id="topThreeKicker" class="text-xs text-yellow-300 font-bold"></p>
          <h3 id="topThreeTitle" class="text-2xl font-black mt-1"></h3>
        </div>
        <button id="closeTopThreeBtn" class="text-white/70 hover:text-white text-xl" aria-label="close"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div id="topThreeList" class="p-5 space-y-3"></div>
    </div>
  </div>

  <div id="allMembersModal" class="fixed inset-0 bg-slate-900/60 hidden z-50 p-4 items-center justify-center">
    <div class="bg-white rounded-lg max-w-4xl w-full shadow-2xl overflow-hidden">
      <div class="rotary-blue p-5 text-white flex justify-between items-start">
        <div>
          <p id="allMembersKicker" class="text-xs text-yellow-300 font-bold"></p>
          <h3 id="allMembersTitle" class="text-2xl font-black mt-1"></h3>
        </div>
        <button id="closeAllMembersBtn" class="text-white/70 hover:text-white text-xl" aria-label="close"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div id="allMembersGrid" class="p-5 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 max-h-[70vh] overflow-y-auto"></div>
    </div>
  </div>

        { title: "\u7b2c\u4e03\u661f\u7cfb\uff1a\u6210\u9577\u4e4b\u661f", icon: "graduation-cap", goal: "\u6301\u7e8c\u5b78\u7fd2\u8207\u57f9\u990a\u6276\u8f2a\u9818\u5c0e\u529b", tasks: ["\u5b8c\u6210 RLI", "\u53c3\u52a0\u8de8\u5730\u5340\u5713\u684c\u8ad6\u58c7", "\u6276\u8f2a\u9818\u5c0e\u529b\u57f9\u8a13", "\u5b78\u7fd2\u578b\u8ab2\u7a0b"] }
      ]
    };

    const googleSheet = {
      id: "167BBJdlNlOXLwFeudMwI_74680hfCHax",
      membersGid: "135569316",
      starMapGid: "1946869433",
      recordsGid: "1334576869"
    };

    const sheetColumns = {
      name: "\u59d3\u540d",
      spouse: "\u5bf6(\u5c0a)\u7737",
      role: "\u8eab\u4efd",
      status: "\u72c0\u614b",

      date: "\u65e5\u671f",
      activity: "\u6d3b\u52d5",

    };

    const sheetUrl = (gid) => `https://docs.google.com/spreadsheets/d/${googleSheet.id}/export?format=csv&gid=${gid}`;

    const fmt = (dateText) => {
      const d = new Date(`${dateText}T00:00:00`);
      return `${d.getMonth() + 1}/${d.getDate()}`;
    };

    function monthLabel(monthKey) {
      const date = new Date(`${monthKey}-01T00:00:00`);
      return `${date.getMonth() + 1}\u6708`;

    function memberMonthStars(member, monthKey = appData.club.currentMonth) {
      return (member.history || [])
        .filter((item) => item.date && item.date.startsWith(monthKey))
        .reduce((sum, item) => sum + Number(item.stars || 0), 0);
    }

    function memberCoupleStars(member) {
      return (member.history || [])
        .filter((item) => String(item.note || "").includes("\u795e\u4ed9\u7737\u4fb6"))
        .reduce((sum, item) => sum + Number(item.stars || 0), 0);
    }

    async function loadData() {
      const fallback = await loadFallbackData();
      appData = await loadGoogleSheetData(fallback);
      selectedMonth = appData.club.currentMonth || (appData.starMap[0] ? appData.starMap[0].month : "");
      renderStaticText();
      renderAll();
    }

    async function loadFallbackData() {
      try {
        const res = await fetch("data/site-data.json", { cache: "no-store" });
        if (!res.ok) throw new Error("fallback not found");
        const data = await res.json();
        return {
          ...embeddedFallback,
          ...data,
          club: { ...embeddedFallback.club, ...(data.club || {}) },
          rules: data.rules && data.rules.length ? data.rules : embeddedFallback.rules
        };
      } catch (error) {
        return embeddedFallback;
      }
    }

    async function loadGoogleSheetData(fallback) {
      try {
        const [membersCsv, starMapCsv, recordsCsv] = await Promise.all([
          fetchText(sheetUrl(googleSheet.membersGid)),
          fetchText(sheetUrl(googleSheet.starMapGid)),
          fetchText(sheetUrl(googleSheet.recordsGid))
        ]);

        const members = buildMembers(parseCsv(membersCsv), parseCsv(recordsCsv));
        const starMap = buildStarMap(parseCsv(starMapCsv));

        return {
          club: {
            ...fallback.club,
            currentMonth: fallback.club.currentMonth && starMap.some((month) => month.month === fallback.club.currentMonth)
              ? fallback.club.currentMonth
              : (starMap[0] ? starMap[0].month : fallback.club.currentMonth)
          },
          members: members.length ? members : fallback.members,
          starMap: starMap.length ? starMap : fallback.starMap,
          rules: fallback.rules
        };
      } catch (error) {
        return fallback;
      }
    }

    async function fetchText(url) {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error(`Unable to load ${url}`);
      return await res.text();
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let quoted = false;

      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"' && quoted && next === '"') {
          cell += '"';
          i += 1;
        } else if (char === '"') {
          quoted = !quoted;
        } else if (char === "," && !quoted) {
          row.push(cell);
          cell = "";
        } else if ((char === "\n" || char === "\r") && !quoted) {
          if (char === "\r" && next === "\n") i += 1;
          row.push(cell);
          if (row.some((value) => value.trim() !== "")) rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }

      row.push(cell);
      if (row.some((value) => value.trim() !== "")) rows.push(row);
      if (!rows.length) return [];

      const headers = rows[0].map((header) => header.trim());
      return rows.slice(1).map((values) => {
        const item = {};
        headers.forEach((header, index) => {
          item[header] = (values[index] || "").trim();
        });
        return item;
      });
    }

    function buildMembers(memberRows, recordRows) {
      const records = new Map();

      recordRows.forEach((row) => {
        if (!row[sheetColumns.name]) return;
        const key = memberKey(row[sheetColumns.name]);
        const recordStars = parseRecordStars(row);
        const item = {
          date: parseSheetDate(row[sheetColumns.date]),
          activity: row[sheetColumns.activity] || "",
          stars: recordStars,
          note: parseRecordNote(row)
        };
        if (!records.has(key)) records.set(key, []);
        records.get(key).push(item);
      });

      return memberRows.filter((row) => row[sheetColumns.name]).map((row) => {
        const history = (records.get(memberKey(row[sheetColumns.name])) || []).sort((a, b) => a.date.localeCompare(b.date));
        return {
          name: row[sheetColumns.name],
          role: row[sheetColumns.role] || "\u793e\u53cb",
          status: row[sheetColumns.status] || "\u555f\u7528",
          spouse: row[sheetColumns.spouse] || "",
          note: row[sheetColumns.note] || "",
          stars: history.reduce((sum, item) => sum + item.stars, 0),
          monthlyStars: 0,
          history
        };
      });
    }

    function buildStarMap(rows) {
      const months = new Map();

      rows.forEach((row) => {
        if (!row[sheetColumns.month] || !row[sheetColumns.activity]) return;
        const parsedMonth = parseSheetMonth(row[sheetColumns.month]);
        if (!parsedMonth) return;

        if (!months.has(parsedMonth.month)) {
          months.set(parsedMonth.month, { month: parsedMonth.month, label: parsedMonth.label, events: [] });
        }

        months.get(parsedMonth.month).events.push({
          date: parseSheetDate(row[sheetColumns.date], parsedMonth.month),
          name: row[sheetColumns.activity],
          stars: parseSheetNumber(row[sheetColumns.stars]),
          status: parseSheetStatus(row[sheetColumns.status]),
          signupUrl: row[sheetColumns.signupUrl] || ""
        });
      });

      return [...months.values()].sort((a, b) => a.month.localeCompare(b.month));
    }

    function memberKey(name) {
      return String(name || "").replace(/\s/g, "").toLowerCase();
    }

    function parseSheetNumber(value) {
      const match = String(value || "").match(/\d+/);
      return match ? Number(match[0]) : 0;
    }

    function parseRecordStars(row) {
      const direct = parseSheetNumber(row[sheetColumns.stars]);
      if (direct > 0) return direct;
      return parseSheetNumber(row["\u661f\u7cfb"]);
    }

    function parseRecordNote(row) {
      const note = row[sheetColumns.note] || "";
      const starsText = row[sheetColumns.stars] || "";
      return note || (parseSheetNumber(starsText) > 0 ? "" : starsText);
    }

    function parseSheetMonth(value) {
      const match = String(value || "").match(/(\d{4})\D+(\d{1,2})/);
      if (!match) return null;
      const year = Number(match[1]);
      const month = Number(match[2]);
      return { month: `${year}-${String(month).padStart(2, "0")}`, label: `${year}\u5e74${month}\u6708` };
    }

    function parseSheetDate(value, monthKey = "") {
      const text = String(value || "").trim();
      if (!text) return "";
      const full = text.match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);
      if (full) return `${full[1]}-${String(full[2]).padStart(2, "0")}-${String(full[3]).padStart(2, "0")}`;
      const short = text.match(/(\d{1,2})\D+(\d{1,2})/);
      if (short && monthKey) return `${monthKey.split("-")[0]}-${String(short[1]).padStart(2, "0")}-${String(short[2]).padStart(2, "0")}`;
      return text;
    }

    function parseSheetStatus(value) {
      const text = String(value || "").trim();
      if (text === "\u5df2\u5b8c\u6210" || text === "done") return "done";
      if (text === "\u53ef\u53c3\u52a0" || text === "\u53ef\u5831\u540d" || text === "open") return "open";
      return "planned";
    }

    function rankedMembers() {
      return activeMembers().sort((a, b) => b.stars - a.stars);

              </div>
              <div class="min-w-0">
                <h3 class="font-black text-slate-800 leading-snug">${rule.title}</h3>
                <p class="text-xs text-slate-500 mt-1">${(rule.tasks || []).length} ${t.taskCount}</p>
              </div>
            </div>
          </div>
          <div class="mt-4 bg-white border border-amber-100 rounded p-3">
            <p class="text-xs font-black rotary-gold">${t.missionGoal}</p>
            <p class="text-sm font-bold mt-1">${rule.goal}</p>
          </div>
          <div class="mt-4">
            <p class="text-xs font-black text-slate-500 mb-2">${t.availableTasks}</p>
            <ul class="space-y-1.5 text-sm text-slate-700">${tasks}</ul>
          </div>
        </article>`;
      }).join("");
    }

    function openMemberModal(name) {
      const ranked = rankedMembers();
      const m = ranked.find((x) => x.name === name);
      if (!m) return;
      modalName.textContent = m.name;
      modalRole.textContent = m.role;
      modalStars.textContent = m.stars;
      modalMonthlyStars.textContent = memberMonthStars(m);
      modalRank.textContent = ranked.findIndex((x) => x.name === m.name) + 1;
      modalHistory.innerHTML = m.history.map((h) => `<div class="flex justify-between gap-4 border-b border-slate-100 pb-3"><div><p class="text-xs text-slate-500">${fmt(h.date)}</p><p class="font-bold">${h.activity}</p></div><p class="font-black rotary-gold">+${h.stars} ${t.stars}</p></div>`).join("");
      memberModal.classList.remove("hidden");
      memberModal.classList.add("flex");
    }

    function openTopThreeModal(type) {
      const isMonthly = type === "monthly";
      const isCouple = type === "couple";
      const list = activeMembers().sort((a, b) => {
        if (isMonthly) return memberMonthStars(b) - memberMonthStars(a);
        if (isCouple) return memberCoupleStars(b) - memberCoupleStars(a);
        return b.stars - a.stars;
      }).slice(0, 3);
      topThreeKicker.textContent = t.topThree;
      topThreeTitle.textContent = isMonthly ? `${t.monthlyRank}(${monthLabel(appData.club.currentMonth)})` : isCouple ? t.coupleAward : t.yearlyRank;
      topThreeList.innerHTML = list.map((member, index) => {
        const score = isMonthly ? memberMonthStars(member) : isCouple ? memberCoupleStars(member) : member.stars;
        return `<button class="w-full flex items-center justify-between gap-4 border border-amber-100 rounded p-4 bg-slate-50 hover:bg-amber-50 hover:border-amber-300 transition text-left" data-top-member="${member.name}">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded bg-rotary-gold text-white font-black flex items-center justify-center">${index + 1}</div>
            <div>
              <p class="font-black">${member.name}</p>
              <p class="text-xs text-slate-500">${member.role}</p>
            </div>
          </div>
          <p class="font-black rotary-gold">${score} ${t.stars}</p>
        </button>`;
      }).join("");
      document.querySelectorAll("[data-top-member]").forEach((row) => row.addEventListener("click", () => {
        closeTopThreeModal();
        openMemberModal(row.dataset.topMember);
      }));
      topThreeModal.classList.remove("hidden");
      topThreeModal.classList.add("flex");
    }

    function closeMemberModal() {
      memberModal.classList.add("hidden");
      memberModal.classList.remove("flex");
    }

    function closeTopThreeModal() {
      topThreeModal.classList.add("hidden");
      topThreeModal.classList.remove("flex");
    }

    function openAllMembersModal() {
      const ranked = rankedMembers();
      allMembersKicker.textContent = t.allMembers;
      allMembersTitle.textContent = t.allMembersStars;
      allMembersGrid.innerHTML = ranked.map((m, index) => `<button class="text-left border border-amber-100 rounded p-4 bg-slate-50 hover:bg-amber-50 hover:border-amber-300 transition" data-all-member="${m.name}">
        <div class="flex items-start justify-between gap-3">
          <div>
            <p class="text-xs text-slate-500">#${index + 1} ${m.role}</p>
            <p class="text-lg font-black mt-1">${m.name}</p>
            ${m.spouse ? `<p class="text-xs text-slate-500 mt-1">${t.spouse} ${m.spouse}</p>` : ""}
          </div>
          <i class="fa-solid fa-star text-yellow-500"></i>
        </div>
        <div class="mt-4 grid grid-cols-2 gap-2 text-sm">
          <div class="bg-white border border-slate-100 rounded p-2"><p class="text-xs text-slate-500">${t.yearStars}</p><p class="font-black rotary-gold">${m.stars}</p></div>
          <div class="bg-white border border-slate-100 rounded p-2"><p class="text-xs text-slate-500">${monthLabel(selectedMonth)}</p><p class="font-black">${memberMonthStars(m, selectedMonth)}</p></div>
        </div>
      </button>`).join("");
      document.querySelectorAll("[data-all-member]").forEach((row) => row.addEventListener("click", () => {
        closeAllMembersModal();
        expandedMember = row.dataset.allMember;
        renderLeaderboard();
        document.querySelector(`[data-member="${CSS.escape(expandedMember)}"]`)?.scrollIntoView({ behavior: "smooth", block: "center" });
      }));
      allMembersModal.classList.remove("hidden");
      allMembersModal.classList.add("flex");
    }

    function closeAllMembersModal() {
      allMembersModal.classList.add("hidden");
      allMembersModal.classList.remove("flex");
    }

    searchInput.addEventListener("input", renderLeaderboard);
    monthPrevBtn.addEventListener("click", () => monthTabs.scrollBy({ left: -240, behavior: "smooth" }));
    monthNextBtn.addEventListener("click", () => monthTabs.scrollBy({ left: 240, behavior: "smooth" }));
    openAllMembersBtn.addEventListener("click", openAllMembersModal);
    closeModalBtn.addEventListener("click", closeMemberModal);
    closeTopThreeBtn.addEventListener("click", closeTopThreeModal);
    closeAllMembersBtn.addEventListener("click", closeAllMembersModal);
    memberModal.addEventListener("click", (event) => { if (event.target.id === "memberModal") closeMemberModal(); });
    topThreeModal.addEventListener("click", (event) => { if (event.target.id === "topThreeModal") closeTopThreeModal(); });
    allMembersModal.addEventListener("click", (event) => { if (event.target.id === "allMembersModal") closeAllMembersModal(); });
    loadData();
  </script>
</body>
</html>
