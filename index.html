<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台北中山扶輪社 26-27年度 摘星英雄榜</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: #f0f4f8; }
        .rotary-blue { background-color: #0c2340; }
        .rotary-gold { color: #8a704c; }
        .border-rotary-gold { border-color: #8a704c; }
    </style>
</head>
<body>

    <nav class="rotary-blue text-white shadow-lg px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <i class="fa-solid fa-star text-yellow-400 text-2xl animate-pulse"></i>
            <span class="text-xl font-bold tracking-wider">全員摘星 榮耀地區</span>
        </div>
        <div class="text-sm border border-yellow-500/30 bg-yellow-500/10 px-3 py-1 rounded-full text-yellow-400 font-semibold">
            2026-27 年度摘星計畫
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-4 md:p-6 space-y-6">

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-gradient-to-br from-amber-50 to-orange-100 p-5 rounded-xl border border-amber-200 shadow-sm flex items-center space-x-4">
                <div class="bg-amber-500 text-white p-3 rounded-full shadow-md">
                    <i class="fa-solid fa-trophy text-2xl"></i>
                </div>
                <div>
                    <p class="text-xs text-amber-700 font-bold uppercase tracking-wider">本月冠軍戰隊 (5月)</p>
                    <p class="text-xl font-black text-slate-800">Team 2 織女星</p>
                </div>
            </div>
            <div class="bg-gradient-to-br from-blue-50 to-indigo-100 p-5 rounded-xl border border-blue-200 shadow-sm flex items-center space-x-4">
                <div class="bg-indigo-600 text-white p-3 rounded-full shadow-md">
                    <i class="fa-solid fa-medal text-2xl"></i>
                </div>
                <div>
                    <p class="text-xs text-indigo-700 font-bold uppercase tracking-wider">本季摘星 MVP</p>
                    <p class="text-xl font-black text-slate-800">AlanWen / Team 1</p>
                </div>
            </div>
            <div class="bg-gradient-to-br from-emerald-50 to-teal-100 p-5 rounded-xl border border-emerald-200 shadow-sm flex items-center space-x-4">
                <div class="bg-emerald-600 text-white p-3 rounded-full shadow-md">
                    <i class="fa-solid fa-star-and-crescent text-2xl"></i>
                </div>
                <div>
                    <p class="text-xs text-emerald-700 font-bold uppercase tracking-wider">全社已摘星星總數</p>
                    <p class="text-2xl font-black text-slate-800">1,845 <span class="text-sm font-normal text-emerald-600">☆</span></p>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center">
                <i class="fa-solid fa-chart-bar text-indigo-600 mr-2"></i> 4 大戰隊星光爭霸戰 (即時戰況)
            </h2>
            <div class="space-y-4">
                <div>
                    <div class="flex justify-between text-sm font-semibold mb-1">
                        <span class="text-slate-700">Team 1 天狼星 (Caroline 隊)</span>
                        <span class="text-indigo-600">540 ☆</span>
                    </div>
                    <div class="w-full bg-slate-100 h-4 rounded-full overflow-hidden">
                        <div class="bg-blue-600 h-full rounded-full transition-all duration-500" style="width: 85%;"></div>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between text-sm font-semibold mb-1">
                        <span class="text-slate-700">Team 2 織女星 (Francesca 隊) ✨</span>
                        <span class="text-amber-600">580 ☆ (領先)</span>
                    </div>
                    <div class="w-full bg-slate-100 h-4 rounded-full overflow-hidden">
                        <div class="bg-amber-500 h-full rounded-full transition-all duration-500" style="width: 92%;"></div>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between text-sm font-semibold mb-1">
                        <span class="text-slate-700">Team 3 北極星 (Van 隊)</span>
                        <span class="text-slate-700">420 ☆</span>
                    </div>
                    <div class="w-full bg-slate-100 h-4 rounded-full overflow-hidden">
                        <div class="bg-emerald-500 h-full rounded-full transition-all duration-500" style="width: 68%;"></div>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between text-sm font-semibold mb-1">
                        <span class="text-slate-700">Team 4 大熊星 (Roy 隊)</span>
                        <span class="text-slate-700">305 ☆</span>
                    </div>
                    <div class="w-full bg-slate-100 h-4 rounded-full overflow-hidden">
                        <div class="bg-purple-500 h-full rounded-full transition-all duration-500" style="width: 50%;"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4 mb-6">
                <h2 class="text-lg font-bold text-slate-800 flex items-center">
                    <i class="fa-solid fa-list-ol text-indigo-600 mr-2"></i> 社友個人星光排行總榜
                </h2>
                <div class="flex items-center space-x-2">
                    <div class="relative">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-slate-400 text-sm"></i>
                        <input id="searchInput" type="text" placeholder="搜尋社友英文名..." class="pl-9 pr-4 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 w-64">
                    </div>
                    <button onclick="sortTable()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-2 rounded-lg text-sm font-medium flex items-center space-x-1 transition">
                        <i class="fa-solid fa-sort"></i> <span>星星排序</span>
                    </button>
                </div>
            </div>

            <div class="overflow-x-auto rounded-xl border border-slate-100">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 text-xs font-bold uppercase tracking-wider border-b border-slate-100">
                            <th class="py-3 px-4 text-center">名次</th>
                            <th class="py-3 px-4">社友 Name</th>
                            <th class="py-3 px-4">所屬戰隊</th>
                            <th class="py-3 px-4 text-right">目前累積星星</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboardBody" class="divide-y divide-slate-50 text-sm text-slate-700">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <footer class="text-center py-8 text-xs text-slate-400">
        台北中山扶輪社 秘書處 2026 數位創新服務
    </footer>

    <script>
        // 匯入你先前確認過的全英文不含出席異常者的乾淨名單
        const initialMembers = [
            { name: 'AlanWen', team: 'Team 1 天狼星', stars: 85 },
            { name: 'Avic', team: 'Team 1 天狼星', stars: 70 },
            { name: 'Aking', team: 'Team 1 天狼星', stars: 65 },
            { name: 'Calvin', team: 'Team 1 天狼星', stars: 55 },
            { name: 'Charles', team: 'Team 1 天狼星', stars: 50 },
            { name: 'David', team: 'Team 1 天狼星', stars: 45 },
            { name: 'Ivan', team: 'Team 1 天狼星', stars: 10 },
            { name: 'Jennifer', team: 'Team 1 天狼星', stars: 5 },
            
            { name: 'Jenny', team: 'Team 2 織女星', stars: 90 },
            { name: 'Fong', team: 'Team 2 織女星', stars: 80 },
            { name: 'Hank', team: 'Team 2 織女星', stars: 75 },
            { name: 'Ian', team: 'Team 2 織女星', stars: 65 },
            { name: 'Jay', team: 'Team 2 織女星', stars: 60 },
            { name: 'Jason', team: 'Team 2 織女星', stars: 55 },
            { name: 'James', team: 'Team 2 織女星', stars: 50 },
            { name: 'Kim', team: 'Team 2 織女星', stars: 40 },
            { name: 'Melvin', team: 'Team 2 織女星', stars: 15 },

            { name: 'Leo', team: 'Team 3 北極星', stars: 80 },
            { name: 'Lisa', team: 'Team 3 北極星', stars: 75 },
            { name: 'Larry', team: 'Team 3 北極星', stars: 60 },
            { name: 'Louis', team: 'Team 3 北極星', stars: 55 },
            { name: 'Liang', team: 'Team 3 北極星', stars: 50 },
            { name: 'Michael', team: 'Team 3 北極星', stars: 45 },
            { name: 'Marine', team: 'Team 3 北極星', stars: 40 },
            { name: 'Michelle', team: 'Team 3 北極星', stars: 35 },
            { name: 'Rich', team: 'Team 3 北極星', stars: 20 },

            { name: 'Stanley', team: 'Team 4 大熊星', stars: 65 },
            { name: 'Maria', team: 'Team 4 大熊星', stars: 55 },
            { name: 'Neo', team: 'Team 4 大熊星', stars: 50 },
            { name: 'Sunivy', team: 'Team 4 大熊星', stars: 45 },
            { name: 'Sean', team: 'Team 4 大熊星', stars: 40 },
            { name: 'Vincent', team: 'Team 4 大熊星', stars: 30 },
            { name: 'West', team: 'Team 4 大熊星', stars: 25 },
            { name: 'Vivian', team: 'Team 4 大熊星', stars: 10 }
        ];

        let isAscending = false;

        // 渲染表格
        function renderTable(data) {
            const tbody = document.getElementById('leaderboardBody');
            tbody.innerHTML = '';
            data.forEach((member, index) => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-slate-50/80 transition-colors';
                
                // 前三名給予獎牌圖示
                let rankDisplay = index + 1;
                if(index === 0) rankDisplay = '🥇';
                if(index === 1) rankDisplay = '🥈';
                if(index === 2) rankDisplay = '🥉';

                tr.innerHTML = `
                    <td class="py-3 px-4 text-center font-bold text-slate-500">${rankDisplay}</td>
                    <td class="py-3 px-4 font-bold text-slate-800">${member.name}</td>
                    <td class="py-3 px-4 text-slate-500 text-xs">${member.team}</td>
                    <td class="py-3 px-4 text-right font-black text-indigo-600">${member.stars} <span class="text-xs text-slate-400 font-normal">☆</span></td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 排序功能
        function sortTable() {
            isAscending = !isAscending;
            const sortedData = [...initialMembers].sort((a, b) => isAscending ? a.stars - b.stars : b.stars - a.stars);
            renderTable(sortedData);
        }

        // 搜尋篩選功能
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const keyword = e.target.value.toLowerCase();
            const filteredData = initialMembers.filter(member => member.name.toLowerCase().includes(keyword));
            renderTable(filteredData);
        });

        // 初始化：預設由高到低排序並顯示
        const defaultSorted = [...initialMembers].sort((a, b) => b.stars - a.stars);
        renderTable(defaultSorted);
    </script>
</body>
</html>
